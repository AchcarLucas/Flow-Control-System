<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Fluxo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .container { width: 80%; margin: auto; }
        canvas { background: #fff; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fluxo de Pessoas - 18/03/2026</h2>
        <canvas id="graficoFluxo"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('graficoFluxo').getContext('2d');

        // 🔽 JSON de dados (simulando API ou banco)
        const dadosFluxo = {
            "data": "2026-03-18",
            "registros": [
                { "hora": "08:00", "entrada": 12, "saida": 5 },
                { "hora": "10:00", "entrada": 19, "saida": 12 },
                { "hora": "12:00", "entrada": 45, "saida": 38 },
                { "hora": "14:00", "entrada": 25, "saida": 28 },
                { "hora": "16:00", "entrada": 32, "saida": 40 },
                { "hora": "18:00", "entrada": 10, "saida": 15 }
            ]
        };

        // 🔄 Convertendo JSON para o formato do gráfico
        const labels = dadosFluxo.registros.map(item => item.hora);
        const entradas = dadosFluxo.registros.map(item => item.entrada);
        const saidas = dadosFluxo.registros.map(item => item.saida);

        const meuGrafico = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Entradas',
                        data: entradas,
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.3
                    },
                    {
                        label: 'Saídas',
                        data: saidas,
                        borderColor: 'rgb(255, 99, 132)',
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    </script>
</body>
</html># PI---V
