; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]

platform = espressif32
board = esp32dev
framework = arduino

lib_ldf_mode = deep+
lib_archive = no

board_build.filesystem = littlefs
board_build.partitions = partitions.csv

monitor_speed = 115200
lib_deps =
    siara-cc/Sqlite3Esp32 @ ^2.3
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson @ ^7.0.4

extra_scripts = pre:./env/env.py

build_flags =
    -w

    -I lib

    -I lib/config 
    -I lib/dao_sqlite
    -I lib/data_monitor
    -I lib/routine_monitor

    -I lib/page
    -I lib/page/index_page
    -I lib/page/analysis_page
    -I lib/page/raw_page
    -I lib/page/stats_page
    -I lib/page/waiting_page

    -I lib/json
    -I lib/json/sample_json
    -I lib/json/stats_json

    -I lib/webserver
    -I lib/webserver/request/index_request
    -I lib/webserver/request/analysis_request
    -I lib/webserver/request/raw_request
    -I lib/webserver/request/stats_request

    -I lib/webserver/request/simulate_request
    -I lib/webserver/request/cleanup_request
    -I lib/webserver/request/reset_request
    -I lib/webserver/request/download_request
    -I lib/webserver/request/delete_request
    -I lib/webserver/api/sample_api
    -I lib/webserver/api/stats_api

    -D DEBUG=1
    -D TITLE='"Monitor de Fluxo de Pessoas"'
    -D SERVER_PORT=80
    -D DATABASE='"database.db"'
    -D CLEANUP='"-7 days"'
    -D SAMPLE_STEP=10
    -D TZS='-3'

